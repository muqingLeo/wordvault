<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WordVault</title>
  <style>
    body {
      width: 380px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }
    .glass-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.6), rgba(200,230,255,0.15));
      pointer-events: none;
    }
    h2 {
      margin: 0;
      padding: 20px;
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, #0071e3, #40a9ff);
      color: white;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    #content {
      padding: 20px;
      min-height: 340px;
      position: relative;
      z-index: 2;
    }
    button {
      background: #0071e3;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 9999px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(0,113,227,0.3);
      cursor: pointer;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0,113,227,0.4);
    }
  </style>
</head>
<body>
  <div class="glass-container" id="glass">
    <h2>WordVault</h2>
    <div id="content"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
