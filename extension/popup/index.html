<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WordVault</title>
  <style>
    body {
      width: 380px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      overflow: hidden;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
    }
    .glass-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(180,220,255,0.2));
      pointer-events: none;
    }
    h2 {
      margin: 0;
      padding: 22px 20px 16px;
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, #0071e3, #5eb0ff);
      color: white;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }
    #content {
      padding: 20px;
      min-height: 340px;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="glass-container" id="glass">
    <h2>WordVault</h2>
    <div id="content"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
