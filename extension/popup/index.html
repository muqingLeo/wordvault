<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WordVault</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
    
    body {
      width: 380px;
      margin: 0;
      font-family: 'SF Pro Display', system-ui, sans-serif;
      overflow: hidden;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }
    .glass-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
      pointer-events: none;
      z-index: 1;
    }
    h2 {
      margin: 0;
      padding: 20px;
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, #0071e3, #40a9ff);
      color: white;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    #content {
      position: relative;
      z-index: 2;
      padding: 16px;
      min-height: 340px;
    }
  </style>
</head>
<body>
  <div class="glass-container" id="glass">
    <h2>WordVault</h2>
    <div id="content"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
