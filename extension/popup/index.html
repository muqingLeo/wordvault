<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WordVault</title>
  <style>
    body { width: 380px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: transparent; overflow: hidden; }
    
    .glass {
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(52px) saturate(190%);
      -webkit-backdrop-filter: blur(52px) saturate(190%);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 70px -15px rgba(0,0,0,0.4), inset 0 1.5px 0 rgba(255,255,255,0.5);
      position: relative;
    }
    
    .glass::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.03) 70%);
      pointer-events: none; z-index: 1;
    }
    
    .glass::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 30%), rgba(255,255,255,0.35) 0%, transparent 60%);
      pointer-events: none; z-index: 2; transition: all 0.1s linear;
    }
    
    .header {
      padding: 20px 24px 16px;
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      color: white;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      position: relative;
      z-index: 10;
    }
    
    #content { padding: 24px; min-height: 360px; position: relative; z-index: 3; color: #111827; }
    
    .glass-btn {
      width: 100%; padding: 15px; background: rgba(255,255,255,0.95); color: #111827;
      border: 1px solid rgba(255,255,255,0.4); border-radius: 9999px; font-weight: 600;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s ease;
    }
    .glass-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="glass" id="glass">
    <div class="header">WordVault</div>
    <div id="content"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
